        // Marca las habitaciones opcionales en dead ends restantes según probabilidades
        function markOptionalRooms() {
            const deadEnds = validateDeadEnds();
            if (!deadEnds || deadEnds.length === 0) return;

            const floor = currentFloor;
            const isOddFloor = floor % 2 === 1;

            // Tipos de habitaciones opcionales ya generados en este mapa
            const generatedTypes = new Set();

            // Definir los tipos de habitaciones opcionales con sus probabilidades
            const roomTypes = [
                { key: 'arcade', chance: 10, subKey: 'arcade', subChance: 0.10, getType: () => Math.random() < 0.10 ? 'chest' : 'arcade' },
                { key: 'challenge', chance: 20, subKey: 'challenge', subChance: 0, getType: () => isOddFloor ? 'challenge' : 'bossChallenge' },
                { key: 'miniBoss', chance: 25, subKey: 'miniBoss', subChance: 0, getType: () => 'miniBoss' },
                { key: 'cursed', chance: 50, subKey: 'cursed', subChance: 0, getType: () => 'cursed' },
                { key: 'library', chance: 0.05, subKey: 'library', subChance: 0, getType: () => 'library' },
                { key: 'dice', chance: 14, subKey: 'dice', subChance: 0, getType: () => Math.random() < 0.50 ? 'sacrifice' : 'dice' },
                { key: 'planetarium', chance: 1, subKey: 'planetarium', subChance: 0, getType: () => 'planetarium' }
            ];

            // Filtrar dead ends que ya están ocupadas por otras salas especiales
            let availableDeadEnds = deadEnds.filter(de => {
                const cell = map[de.y][de.x];
                return !cell.isBoss && !cell.isItemRoom && !cell.isShopRoom && 
                       !cell.isSecret && !cell.isSuperSecret;
            });

            // Intentar generar habitaciones opcionales
            //barajar las dead ends para tener un orden aleatorio de intento
            for (let i = availableDeadEnds.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availableDeadEnds[i], availableDeadEnds[j]] = [availableDeadEnds[j], availableDeadEnds[i]];
            }

            for (const de of availableDeadEnds) {
                // Barajar los tipos de habitación para que todos tengan la misma oportunidad
                const shuffledTypes = [...roomTypes];
                for (let i = shuffledTypes.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledTypes[i], shuffledTypes[j]] = [shuffledTypes[j], shuffledTypes[i]];
                }

                // Intentar cada tipo de habitación en orden aleatorio
                let placed = false;
                for (const roomType of shuffledTypes) {
                    // Verificar si este tipo ya fue generado
                    if (generatedTypes.has(roomType.key) || generatedTypes.has(roomType.subKey)) {
                        continue;
                    }

                    // Verificar si toca según la probabilidad
                    if (Math.random() * 100 < roomType.chance) {
                        const finalType = roomType.getType();
                        map[de.y][de.x]['is' + finalType.charAt(0).toUpperCase() + finalType.slice(1) + 'Room'] = true;
                        generatedTypes.add(finalType);
                        console.log(`${finalType}: ${de.x + 1}X ${de.y + 1}Y`);
                        placed = true;
                        break;
                    }
                }
                // Si no se placed ninguna habitación, se queda como estaba (dead end normal)
            }
        }

        // Coloca la sala secreta según las reglas
        function placeSecretRoom() {
            let bestPositions = [];
            let maxAdj = 0;
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    // Solo en celdas vacías o huecos de L
                    if (map[y][x] !== null && !(map[y][x].isHole)) continue;
                    let adjRooms = 0;
                    let adjBoss = false;
                    for (const dir of DIRECTIONS) {
                        const ax = x + dir.dx;
                        const ay = y + dir.dy;
                        if (ax >= 0 && ax < GRID_SIZE && ay >= 0 && ay < GRID_SIZE) {
                            const cell = map[ay][ax];
                            if (cell && !cell.isHole) {
                                if (cell.isBoss) adjBoss = true;
                                else adjRooms++;
                            }
                        }
                    }
                    if (!adjBoss && adjRooms > 0) {
                        if (adjRooms > maxAdj) {
                            maxAdj = adjRooms;
                            bestPositions = [{ x, y }];
                        } else if (adjRooms === maxAdj) {
                            bestPositions.push({ x, y });
                        }
                    }
                }
            }
            if (bestPositions.length > 0) {
                const chosen = bestPositions[Math.floor(Math.random() * bestPositions.length)];
                map[chosen.y][chosen.x] = { type: 'S', isSecret: true, revealed: false };
                console.log(`secreta: ${chosen.x + 1}X ${chosen.y + 1}Y ADJ/${maxAdj}`);

            } else {
                console.warn('No se pudo colocar sala secreta.');
            }
        }

        // Encuentra la posición de la sala de boss
        function findBossRoom() {
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = map[y][x];
                    if (cell && cell.isBoss) {
                        return { x, y };
                    }
                }
            }
            return null;
        }

        // Encuentra la posición de la sala secreta
        function findSecretRoom() {
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = map[y][x];
                    if (cell && cell.isSecret) {
                        return { x, y };
                    }
                }
            }
            return null;
        }

        // Coloca la sala super secreta según las reglas:
        // - Se genera como un dead end (una sola habitación adyacente)
        // - Se genera lo más lejos posible de la sala de inicio
        // - No puede generarse al lado de la sala de boss
        // - Debe ser de cualquier otro tipo de habitación (no puede ser la sala secreta)
        // - Si hay varias posibles, que se genere la más cercana a la sala del boss
        function placeSuperSecretRoom() {
            const startRoom = findStartRoom();
            const bossRoom = findBossRoom();
            const secretRoom = findSecretRoom();
            if (!startRoom || !bossRoom) return;

            // Encontrar todas las posiciones válidas para sala super secreta
            // Debe ser: celda vacía, exactamente 1 habitación adyacente (dead end), no adyacente a boss
            let validPositions = [];
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    // Solo en celdas vacías o huecos de L
                    if (map[y][x] !== null && !(map[y][x].isHole)) continue;

                    let adjRooms = 0;
                    let adjBoss = false;
                    let adjSecret = false;
                    let adjacentRoom = null;

                    for (const dir of DIRECTIONS) {
                        const ax = x + dir.dx;
                        const ay = y + dir.dy;
                        if (ax >= 0 && ax < GRID_SIZE && ay >= 0 && ay < GRID_SIZE) {
                            const cell = map[ay][ax];
                            if (cell && !cell.isHole) {
                                if (cell.isBoss) adjBoss = true;
                                else if (cell.isSecret) adjSecret = true;
                                else {
                                    adjRooms++;
                                    adjacentRoom = { x: ax, y: ay };
                                }
                            }
                        }
                    }

                    // Debe ser dead end (1 habitación adyacente), no adyacente a boss ni a sala secreta
                    if (adjRooms === 1 && !adjBoss && !adjSecret) {
                        // Verificar que no sea el lateral de un pasillo
                        if (!isNextToCorridor(x, y)) {
                            validPositions.push({ x, y, adjacentRoom });
                        }
                    }
                }
            }

            if (validPositions.length === 0) {
                console.warn('No se pudo colocar sala super secreta.');
                return;
            }

            // Calcular distancia desde el inicio a cada posición válida
            // Para celdas vacías, la distancia es la distancia a la sala adyacente + 1
            const positionsWithDistance = validPositions.map(pos => {
                // Usar la sala adyacente para calcular la distancia
                const distFromStart = calculateDistance(startRoom.x, startRoom.y, pos.adjacentRoom.x, pos.adjacentRoom.y);
                return { ...pos, distFromStart: distFromStart >= 0 ? distFromStart + 1 : -1 };
            });

            // Encontrar la distancia máxima
            const maxDist = Math.max(...positionsWithDistance.map(p => p.distFromStart));

            // Filtrar solo las posiciones con la distancia máxima
            const farthestPositions = positionsWithDistance.filter(p => p.distFromStart === maxDist);

            // Si hay varias a la misma distancia máxima, elegir la más cercana a la sala de boss
            let chosenPos;
            if (farthestPositions.length === 1) {
                chosenPos = farthestPositions[0];
            } else {
                // Calcular distancia a la sala de boss y elegir la más cercana
                let minDistToBoss = Infinity;
                let closestToBoss = null;
                for (const pos of farthestPositions) {
                    const distToBoss = Math.abs(pos.x - bossRoom.x) + Math.abs(pos.y - bossRoom.y);
                    if (distToBoss < minDistToBoss) {
                        minDistToBoss = distToBoss;
                        closestToBoss = pos;
                    }
                }
                chosenPos = closestToBoss;
            }

            map[chosenPos.y][chosenPos.x] = { type: 'SS', isSuperSecret: true, revealed: false };
            console.log(`super secreta: ${chosenPos.x + 1}X ${chosenPos.y + 1}Y D${chosenPos.distFromStart}`);
        }

        // Verifica si una posición está en el lateral de un pasillo
        function isNextToCorridor(x, y) {
            for (const dir of DIRECTIONS) {
                const ax = x + dir.dx;
                const ay = y + dir.dy;
                if (ax >= 0 && ax < GRID_SIZE && ay >= 0 && ay < GRID_SIZE) {
                    const cell = map[ay][ax];
                    if (cell && (cell.type === 'PH' || cell.type === 'PV')) {
                        // Es un pasillo, verificar si (x,y) está en el lateral
                        if (cell.type === 'PH') {
                            // Pasillo horizontal - los laterales son arriba y abajo
                            if (dir.dy !== 0) return true;
                        } else if (cell.type === 'PV') {
                            // Pasillo vertical - los laterales son izquierda y derecha
                            if (dir.dx !== 0) return true;
                        }
                    }
                }
            }
            return false;
        }

        // Aplica modificadores automáticos según el piso
        function applyAutoModifiers() {
            const floor = currentFloor;
            const hardModeCheckbox = document.getElementById('hardMode');
            const curseCheckbox = document.getElementById('curseOfTheLost');
            const xlCheckbox = document.getElementById('xlMode');
            
            // Resetear checkboxes
            hardModeCheckbox.checked = false;
            curseCheckbox.checked = false;
            xlCheckbox.checked = false;
            
            
            
            if (floor >= 10) {
                // Piso 10+: posibilidad de XL Mode (100%)
                xlCheckbox.checked = true;
                if (Math.random() < 0.50) {
                    hardModeCheckbox.checked = true;
                }
                if (Math.random() < 0.50) {
                    curseCheckbox.checked = true;
                }
            } else if (floor >= 7) {
                // Piso 8+: posibilidad de XL Mode (50%)
                if (Math.random() < 0.50) {
                    xlCheckbox.checked = true;
                }
                // Piso 3+: posibilidad de Hard Mode (25%)
                if (Math.random() < 0.5) {
                    hardModeCheckbox.checked = true;
                }
                // Posibilidad de Curse of the Lost (25%)
                if (Math.random() < 0.5) {
                    curseCheckbox.checked = true;
                }
            } else if (floor >= 5) {
                // Piso 5+: posibilidad de XL Mode (25%)
                if (Math.random() < 0.25) {
                    xlCheckbox.checked = true;
                }
                // Piso 3+: posibilidad de Hard Mode (25%)
                if (Math.random() < 0.5) {
                    hardModeCheckbox.checked = true;
                }
                // Posibilidad de Curse of the Lost (25%)
                if (Math.random() < 0.5) {
                    curseCheckbox.checked = true;
                }
            } else if (floor >= 3) {
                // Piso 3+: posibilidad de Hard Mode (25%)
                if (Math.random() < 0.25) {
                    hardModeCheckbox.checked = true;
                }
                // Posibilidad de Curse of the Lost (25%)
                if (Math.random() < 0.25) {
                    curseCheckbox.checked = true;
                }
            } else {
                // Pisos 1-2: posibilidad de Hard Mode (10%) y Curse of the Lost (10%)
                if (Math.random() < 0.10) {
                    hardModeCheckbox.checked = true;
                }
                if (Math.random() < 0.10) {
                    curseCheckbox.checked = true;
                }
            }
            
            // Log de los modificadores activos
            const mods = [];
            if (hardModeCheckbox.checked) mods.push('Hard Mode');
            if (curseCheckbox.checked) mods.push('Curse of the Lost');
            if (xlCheckbox.checked) mods.push('XL');
            
            if (mods.length > 0) {
                console.log(`%cModificadores activos: ${mods.join(' + ')}`, 'color: #f472b6; font-weight: bold;');
            }
        }

        // Genera y valida el mapa hasta que sea correcto (sin límite de intentos)
        function generateValidMap() {
            console.clear();
            secretsFound = 0;
            gameOver = false;
            
            // Aplicar modificadores automáticos según el piso
            applyAutoModifiers();
            
            let floorNum = parseInt(document.getElementById('floorNumber').value) || 1;
            currentFloor = floorNum;
            updateBackground();
            
            let attempts = 0;
            while (true) {
                // Limpia el mapa
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        map[y][x] = null;
                    }
                }
                generateMap();
                attempts++;
                if (validateCorridors() && validateDeadEnds()) {
                    break;
                }
            }
            console.log(`Habitaciones: ${todaslashabitaciones} / ${habitacionesmaximas}`);
            console.log(`generaciones ${attempts}`);
            const deadEnds = validateDeadEnds();
            console.log(`dead ends: ${deadEnds ? deadEnds.length : 0}`);

            // Marcar la sala de boss
            markBossRoom();
            // Marcar la sala de item
            markItemRoom();
            // Marcar la sala de shop
            markShopRoom();
            // Marcar las habitaciones opcionales en dead ends restantes
            markOptionalRooms();
            // Colocar la sala secreta
            placeSecretRoom();
            // Colocar la sala super secreta
            placeSuperSecretRoom();
            // Debug: mostrar posiciones de habitaciones secretas
            logSecretRoomPositions();

            renderMap();
        }

        // Log de debug para posiciones de habitaciones secretas
        function logSecretRoomPositions() {
            console.log('%c=== HABITACIONES SECRETAS ===', 'color: #fbbf24; font-weight: bold; font-size: 14px;');
            
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = map[y][x];
                    if (cell) {
                        if (cell.isSecret) {
                            console.log(`%c[SALA SECRETA] Posición: ${x + 1}X ${y + 1}Y | Estado: ${cell.revealed ? 'REVELADA' : 'OCULTA'}`, 'color: #10b981;');
                        }
                        if (cell.isSuperSecret) {
                            console.log(`%c[SALA SUPER SECRETA] Posición: ${x + 1}X ${y + 1}Y | Estado: ${cell.revealed ? 'REVELADA' : 'OCULTA'}`, 'color: #f59e0b;');
                        }
                    }
                }
            }
        }

        // Inicializar el display de vidas al cargar
        lives = getInitialLives();
        updateLivesDisplay();
        renderUpgradeStatus();
        generateValidMap();
        updateBackground();
    </script>
